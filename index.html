<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Cleaning Jobs in Narita | Keiyo Hotel Service Co., Ltd.</title>
    <!-- [ඉතිරි කොටස් කලින් තිබූ පරිදිම පවතී] -->
    <style>
        /* [කලින් තිබූ CSS කොටස් සියල්ලම මෙතැනට ඇතුළත් කරන්න] */
    </style>
</head>
<body>

    <div class="page-switcher-bar">
        <button onclick="changePageLayout('gmail')" id="page-btn-gmail" class="switch-page-btn active-page">View Page 1 (Gmail: keiyo.hs.kk@gmail.com)</button>
        <button onclick="changePageLayout('contact')" id="page-btn-contact" class="switch-page-btn">View Page 2 (Email: contact@kiyo-hs.com)</button>
    </div>

    <!-- [කලින් තිබූ HTML ශරීර කොටස් සියල්ලම මෙතැනට ඇතුළත් කරන්න] -->

    <script>
        const emailElement = document.getElementById('company-email');
        const heroSection = document.getElementById('home');
        const aboutImage = document.getElementById('about-img-el');
        const job1Image = document.getElementById('job1-img-el');
        const job2Image = document.getElementById('job2-img-el');

        function changePageLayout(type) {
            document.getElementById('page-btn-gmail').classList.remove('active-page');
            document.getElementById('page-btn-contact').classList.remove('active-page');

            if (type === 'contact') {
                // මෙන්න මෙතන නිවැරදි කරන ලදී (classList එකතු කරන ලදී)
                document.getElementById('page-btn-contact').classList.add('active-page');
                emailElement.textContent = 'contact@kiyo-hs.com';
                heroSection.style.background = "linear-gradient(rgba(26, 54, 93, 0.85), rgba(26, 54, 93, 0.85)), url('https://images.unsplash.com/photo-1566073771259-6a8506099945?q=80&w=2070&auto=format&fit=crop')";
                aboutImage.style.backgroundImage = "url('https://images.unsplash.com/photo-1584132967334-10e028bd69f7?q=80&w=1000&auto=format&fit=crop')";
                job1Image.style.backgroundImage = "url('https://images.unsplash.com/photo-1522771739844-6a9f6d5f14af?q=80&w=1000&auto=format&fit=crop')";
                job2Image.style.backgroundImage = "url('https://images.unsplash.com/photo-1611892440504-42a792e24d32?q=80&w=1000&auto=format&fit=crop')";
            } else {
                document.getElementById('page-btn-gmail').classList.add('active-page');
                emailElement.textContent = 'keiyo.hs.kk@gmail.com';
                heroSection.style.background = "linear-gradient(rgba(26, 54, 93, 0.85), rgba(26, 54, 93, 0.85)), url('https://images.unsplash.com/photo-1540518614846-7eded433c457?q=80&w=2070&auto=format&fit=crop')";
                aboutImage.style.backgroundImage = "url('https://images.unsplash.com/photo-1590490360182-c33d57733427?q=80&w=1000&auto=format&fit=crop')";
                job1Image.style.backgroundImage = "url('https://images.unsplash.com/photo-1616594039964-ae9021a400a0?q=80&w=1000&auto=format&fit=crop')";
                job2Image.style.backgroundImage = "url('https://images.unsplash.com/photo-1582719508461-905c673771fd?q=80&w=1000&auto=format&fit=crop')";
            }
        }
        // [භාෂා පරිවර්තන කොටස කලින් තිබූ පරිදිම තබා ගන්න]
    </script>
</body>
</html>
